<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTO. | Duo Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="duo-style.css">
</head>
<body class="light-mode">
    <div id="flash"></div>

    <header class="duo-header">
        <div class="nav-left">
            <div class="lang-toggle">
                <button onclick="setPageLang('en')" id="btn-en" class="active">EN</button>
                <button onclick="setPageLang('kh')" id="btn-kh">KH</button>
            </div>
        </div>
        <div class="nav-center">
            <h2 class="logo-small" onclick="window.location.href='index.html'">FOTO<span class="dot">.</span>DUO</h2>
        </div>
        <div class="nav-right">
            <button id="theme-toggle" class="icon-btn">
                <svg id="theme-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="22">
                    <path class="sun-path" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" stroke-width="2" stroke-linecap="round"></path>
                    <path class="moon-path hidden" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke-width="2" stroke-linecap="round"></path>
                </svg>
            </button>
        </div>
    </header>

    <div id="progress-bar">
        <div class="step-box"><span>1</span><label id="duo-step1">Layout</label></div>
        <div class="step-connector"></div>
        <div class="step-box"><span>2</span><label id="duo-step2">Snap</label></div>
        <div class="step-connector"></div>
        <div class="step-box"><span>3</span><label id="duo-step3">Design</label></div>
    </div>

    <!-- Step 1: pick HOST / JOIN -->
    <main class="duo-main">
        <section id="role-screen" class="duo-panel active">
            <h1 class="duo-title" id="duo-title">Duo mode</h1>
            <p class="duo-sub" id="duo-sub">Grab a friend and connect with a simple code.</p>
            <div class="duo-role-buttons">
                <button id="btn-host" class="duo-primary" onclick="chooseRole('host')">Host</button>
                <button id="btn-join" class="duo-secondary" onclick="chooseRole('join')">Join</button>
            </div>

            <div id="host-panel" class="duo-host-panel hidden">
                <p class="duo-label" id="duo-share-label">Share this code with your partner:</p>
                <div class="duo-code-box">
                    <span id="room-code">----</span>
                </div>
                <p class="duo-hint" id="duo-hint">After they join, you’ll pick a layout together.</p>
                <button id="btn-next-layout" class="duo-primary" onclick="goToLayout()">Next: Pick layout</button>
            </div>

            <div id="join-panel" class="duo-join-panel hidden">
                <p class="duo-label" id="duo-enter-label">Enter the 4-letter/number code from your host:</p>
                <input id="join-code" maxlength="4" class="duo-input" placeholder="AB12" />
                <button class="duo-primary" onclick="connectJoin()">Join room</button>
                <p id="join-status" class="duo-status-line"></p>
            </div>
        </section>

        <!-- Step 2: layout list (subset of main app layouts) -->
        <section id="layout-screen" class="duo-panel hidden">
            <h2 class="duo-title-small">Pick your layout</h2>
            <p class="duo-sub" id="duo-layout-sub">Duo mode supports these styles only.</p>

            <div class="duo-layout-grid">
                <!-- Only D, F, K, L, M, N, O -->
                <button class="duo-layout-card" onclick="setDuoLayout('D', this)">
                    <div class="l-preview v-strip">
                        <span class="big"></span>
                        <span class="big"></span>
                    </div>
                    <label>STYLE D</label>
                </button>

                <button class="duo-layout-card" onclick="setDuoLayout('F', this)">
                    <div class="l-preview v-grid">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <label>STYLE F</label>
                </button>

                <button class="duo-layout-card" onclick="setDuoLayout('K', this)">
                    <div class="l-preview h-grid">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <label>STYLE K</label>
                </button>

                <button class="duo-layout-card" onclick="setDuoLayout('L', this)">
                    <div class="l-preview h-grid-side">
                        <div class="p-side"></div>
                        <div class="g-2x2">
                            <span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                    <label>STYLE L</label>
                </button>

                <button class="duo-layout-card" onclick="setDuoLayout('M', this)">
                    <div class="l-preview h-print">
                        <div class="p-txt-h">TITLE</div>
                        <div class="row">
                            <span></span><span></span>
                        </div>
                    </div>
                    <label>STYLE M</label>
                </button>

                <button class="duo-layout-card" onclick="setDuoLayout('N', this)">
                    <div class="l-preview h-grid">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <label>STYLE N</label>
                </button>

                <button class="duo-layout-card" onclick="setDuoLayout('O', this)">
                    <div class="l-preview h-print">
                        <div class="row">
                            <span></span><span></span>
                        </div>
                    </div>
                    <label>STYLE O</label>
                </button>
            </div>

            <button id="btn-cont-camera" class="duo-primary" onclick="enterCall()">Continue to camera</button>
        </section>

        <!-- Step 3: call screen with 2 cameras -->
        <section id="call-screen" class="duo-panel hidden">
            <div class="split-container">
                <div class="cam-box">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <div class="label" id="label-you">YOU</div>
                </div>
                <div class="cam-box">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="label" id="label-partner">PARTNER</div>
                    <div id="countdown" class="hidden">3</div>
                </div>
            </div>

            <div class="duo-filters">
                <button id="filter-natural" class="f-pill active" onclick="setDuoFilter('none', this)">Natural</button>
                <button id="filter-bw" class="f-pill" onclick="setDuoFilter('grayscale(100%)', this)">B&amp;W</button>
                <button id="filter-retro" class="f-pill" onclick="setDuoFilter('sepia(60%) contrast(1.1)', this)">Retro</button>
                <button id="filter-vivid" class="f-pill" onclick="setDuoFilter('brightness(1.2) saturate(1.5)', this)">Vivid</button>
            </div>

            <div class="mid-shutter">
                <button id="shutter" class="shutter-btn hidden" onclick="syncShutter()"></button>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="settings-shared.js"></script>
    <script src="duo.js"></script>
</body>
</html>
